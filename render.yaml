# Render Blueprint — git push 시 자동 배포
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: semina-notepad
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # 아래 값들은 Render 대시보드에서 직접 입력 (sync: false)
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
